    <style>
        :root {
            --bg: #f5f2eb;
            --card: #ffffff;

            --danger: #c0392b;
            --text: #3a3228;
            --text-secondary: #5c5348;
            --border: #e3dacb;
            --border-light: #f0ece0;
            --radius: 14px;

        body {

            color: var(--text);

            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 800px; padding-bottom: 100px; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; flex-wrap: wrap; justify-content: center; }
        .tab {
            padding: 0.55rem 1.3rem; border-radius: 22px; background: #e8e3d5; cursor: pointer;
            font-weight: 600; border: none; font-size: 0.9rem; color: var(--text); transition: all 0.2s; white-space: nowrap;
        }
        .tab:active { transform: scale(0.96); }
        .tab.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(200,123,59,0.3); }
        .score-bar {
            position: sticky; top:0.5rem; z-index:100; background: var(--card); border-radius: var(--radius);
            padding: 1rem 1.4rem; box-shadow: var(--shadow); margin-bottom: 1.2rem; border:1px solid var(--border);
            display: flex; align-items: center; gap:1rem; flex-wrap:wrap;
        }
        .score-circle {
            width:68px; height:68px; border-radius:50%; background:#fdfaf5; display:flex; align-items:center;
            justify-content:center; flex-direction:column; font-weight:800; font-size:1.5rem; color:var(--primary-dark);
            flex-shrink:0; border:3px solid var(--primary); line-height:1;
        }
        .score-circle span { font-size:0.6rem; color:var(--text-secondary); font-weight:500; }
        .score-info { flex:1; min-width:120px; }
        .score-info b { font-size:0.95rem; }
        .score-info small { color:var(--text-secondary); font-size:0.8rem; }
        .progress-wrap { width:100%; height:8px; background:#e8e0d3; border-radius:10px; margin-top:0.4rem; overflow:hidden; }
        .progress-fill { height:100%; background:var(--success); border-radius:10px; transition: width 0.35s ease; }
        .accordion { margin-bottom:0.6rem; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); background:#fff; transition: box-shadow 0.2s; }
        .accordion.open { box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .accordion-header {
            background:#faf7f0; padding:0.9rem 1.2rem; cursor:pointer; display:flex; justify-content:space-between;
            align-items:center; font-weight:700; font-size:0.95rem; color:var(--primary-dark); border-bottom:1px solid transparent;
            user-select:none; transition: background 0.2s; gap:0.8rem;
        }
        .accordion-header:active { background:#f3efe5; }
        .accordion-header .header-area { flex:1; }
        .accordion-header .header-sub {
            font-weight:600; font-size:0.8rem; color:var(--primary); background:#fdf3e8; padding:0.2rem 0.6rem;
            border-radius:12px; white-space:nowrap;
        }
        .accordion.open .accordion-header { border-bottom-color:var(--border); }
        .accordion-body { display:none; padding:0.6rem; }
        .accordion.open .accordion-body { display:block; }
        .check-card {
            background:#fff; border-radius:var(--radius-sm); padding:0.9rem 1rem; margin-bottom:0.4rem;
            border:1px solid var(--border-light); display:flex; align-items:flex-start; gap:0.8rem; flex-wrap:wrap;
        }
        .check-card.star-item { border-left:4px solid var(--danger); background:#fffbfb; }
        .card-num { width:28px; height:28px; border-radius:50%; background:#f5f0e6; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem; flex-shrink:0; }
        .star-item .card-num { background:#fde8e8; color:var(--danger); }
        .card-content { flex:1; min-width:180px; }
        .card-text { font-size:0.9rem; font-weight:500; line-height:1.4; }
        .card-max { font-size:0.75rem; color:var(--text-secondary); margin-top:0.15rem; }
        .star-badge { display:inline-block; background:var(--danger); color:#fff; font-size:0.7rem; font-weight:700; padding:0.15rem 0.55rem; border-radius:10px; margin-right:0.3rem; vertical-align:middle; }

        .toggle-btn { padding:0.4rem 1rem; font-size:0.8rem; cursor:pointer; border:none; font-weight:600; background:#fff; color:var(--text); transition:all 0.15s; white-space:nowrap; }

        .toggle-btn.active-pass { background:var(--success); color:#fff; }
        .toggle-btn.active-fail { background:var(--danger); color:#fff; }
        .note-input { width:100%; padding:0.35rem 0.5rem; border-radius:6px; border:1px solid #e8e0d3; font-size:0.8rem; margin-top:0.35rem; background:#fefefc; font-family:inherit; }
        .note-input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(200,123,59,0.1); }
        .image-upload-area { margin-top:0.35rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }

        .q-header { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.5rem; }

        .feedback.correct { background:#e8f5e0; color:#2d6a4f; border:1px solid #c8e6c0; }

        .result-box { text-align:center; background:#f9f7f2; border-radius:16px; padding:2rem 1.5rem; border:1px solid var(--border); }

        .card { background:#fdfaf7; border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem; margin-bottom:1rem; }
        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:0.8rem 1rem; box-shadow:var(--shadow-bottom); display:flex; gap:0.6rem; justify-content:center; flex-wrap:wrap; z-index:100; }
        .btn { padding:0.7rem 1.6rem; border-radius:50px; font-weight:600; border:none; cursor:pointer; background:var(--primary); color:#fff; font-size:0.9rem; transition:all 0.2s; white-space:nowrap; font-family:inherit; }
        .btn:active { transform:scale(0.95); opacity:0.85; }
        .btn-outline { background:#fff; color:var(--primary-dark); border:2px solid var(--primary); }
        .btn-sm { padding:0.45rem 1.2rem; font-size:0.85rem; }
        .btn-success { background:var(--success); }
        .btn-danger-outline { background:#fff; color:var(--danger); border:2px solid var(--danger); }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        #hiddenFileInput { display:none; }
        .exam-nav { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem; align-items:center; }
        @media (max-width:480px) {
            .check-card { flex-direction:column; gap:0.5rem; }
            .score-control { align-self:flex-end; }
            .score-circle { width:56px; height:56px; font-size:1.2rem; }
            .btn { padding:0.6rem 1.2rem; font-size:0.85rem; }
            .q-text { font-size:0.9rem; }
        }
        @media print {
            body { background:white; }
            .score-bar, .bottom-bar, .accordion-header, .image-upload-area, .upload-btn, .tabs, .remove-img-btn, .exam-nav button, .toggle-group, .score-control, #hiddenFileInput { display:none !important; }
            .accordion-body { display:block !important; }
            .check-card { border:1px solid #ddd !important; break-inside:avoid; }
            .container { padding-bottom:0; max-width:100%; }
        }
    </style>

                { type:'single', question:'点餐下单效率要求多少秒内完成？', options:['A. 5秒','B. 10秒','C. 15秒','D. 20秒'], answer:1 },
                { type:'single', question:'线下点餐时，员工进行产品推荐的合理依据是？', options:['A. 随意推荐','B. 依据顾客外型、穿着、谈吐','C. 只推荐最贵的','D. 不推荐'], answer:1 },
                { type:'single', question:'关于外卖回复，督导要求是？', options:['A. 任意时间回复','B. 在指定时间内回复','C. 不需回复','D. 24小时内回复即可'], answer:1 },
                { type:'single', question:'传面到桌面时，哪一项不是必须做的？', options:['A. 确认点餐内容','B. 操作轻','C. 提醒和面','D. 大声叫喊'], answer:3 },
                { type:'single', question:'有声服务的核心是指？', options:['A. 五声服务','B. 默默服务','C. 只喊口号','D. 不需要声音'], answer:0 },
                { type:'single', question:'顾客有特殊需求时，点餐过程哪项错误？', options:['A. 记录所有要求','B. 下单准确','C. 忽略特殊需求','D. 确认需求'], answer:2 },
                { type:'single', question:'关于营销物料，以下哪项正确？', options:['A. 可过期','B. 内容清晰且有效','C. 随意张贴','D. 不需要更新'], answer:1 },
                { type:'single', question:'创客服务中，员工与顾客沟通应？', options:['A. 态度生硬','B. 沟通流畅','C. 不需要交流','D. 简单敷衍'], answer:1 },
                { type:'single', question:'员工个人清洁要求不包括？', options:['A. 面部清洁','B. 口腔无异味','C. 手部清洁','D. 浓妆艳抹'], answer:3 },
                { type:'single', question:'服务过程中，操作音量要求？', options:['A. 越大越好','B. 声音轻柔不影响顾客用餐','C. 无要求','D. 随意'], answer:1 },
                { type:'single', question:'关于会员推荐，正确的是？', options:['A. 不用推荐','B. 积极推荐','C. 顾客拒绝后再推荐','D. 无所谓'], answer:1 },
                { type:'single', question:'提醒顾客自助取茶水的时机是？', options:['A. 点餐时','B. 传面时','C. 收餐时','D. 顾客进门时'], answer:0 },
                { type:'single', question:'确认出品与顾客需求是否相符，应在？', options:['A. 传面前','B. 传面后','C. 顾客吃完后','D. 不需要确认'], answer:0 },
                { type:'single', question:'非高峰时段询问意见的目的？', options:['A. 走形式','B. 收集顾客反馈改进服务','C. 闲聊','D. 无目的'], answer:1 },
                { type:'single', question:'收餐时检查碗内剩余调料是为了？', options:['A. 统计浪费','B. 判断出品是否符合标准','C. 加快收餐速度','D. 无意义'], answer:1 },
                { type:'multiple', question:'员工精神状态检查包括哪些？', options:['A. 着装符合要求','B. 面带微笑','C. 个人清洁','D. 无体味','E. 见面打招呼问候'], answer:[0,1,2,3,4] },
                { type:'multiple', question:'下列哪些属于服务禁止行为？', options:['A. 挖鼻孔','B. 抠脚','C. 大声聊天影响顾客','D. 不回应顾客','E. 操作轻','F. 不解决顾客问题'], answer:[0,1,2,3,5] },
                { type:'multiple', question:'线上接待服务要求包括？', options:['A. 推荐收藏打卡','B. 核销确认成功','C. 指定时间回复外卖','D. 会员推荐','E. 指引查看菜单'], answer:[0,1,2] },
                { type:'multiple', question:'传面及过程服务包含哪些内容？', options:['A. 检查出品与需求相符','B. 喊号喊餐声','C. 提醒和面','D. 提醒烫','E. 非高峰询问意见','F. 提供茶水服务'], answer:[0,1,2,3,4,5] },
                { type:'multiple', question:'以下哪些属于创客服务要求？', options:['A. 营销物料清晰有效','B. 使用服务用语','C. 切合顾客话术','D. 沟通流畅','E. 邻里关系和睦'], answer:[0,1,2,3,4] },
                { type:'multiple', question:'收餐清洁时应注意？', options:['A. 挪动桌子声音轻','B. 快速收完','C. 检查剩余调料','D. 忽视顾客','E. 先收桌再扫地'], answer:[0,2] },
                { type:'multiple', question:'点餐时员工应做到？', options:['A. 打单前确认需求','B. 提醒顾客领取小票','C. 下单准确记录要求','D. 不理会特殊需求','E. 10秒内完成'], answer:[0,1,2,4] },
                { type:'multiple', question:'关于外摆区服务，正确的有？', options:['A. 主动推荐外摆区','B. 外摆区温度适宜时才推荐','C. 下雨天不推荐','D. 引导顾客就坐','E. 不用管'], answer:[0,1,2,3] },
                { type:'multiple', question:'服务态度体现的方面包括？', options:['A. 面带微笑','B. 声音柔和','C. 主动帮助','D. 耐心解答','E. 尊重顾客'], answer:[0,1,2,3,4] }
            ]
        };

        if (!ORIGINAL_QUESTION_BANK.environment || ORIGINAL_QUESTION_BANK.environment.length === 0) {
            ORIGINAL_QUESTION_BANK.environment = [{ type:'truefalse', question:'示例题目', options:['正确','错误'], answer:0 }];
            ORIGINAL_QUESTION_BANK.quality = [{ type:'truefalse', question:'示例题目', options:['正确','错误'], answer:0 }];
            ORIGINAL_QUESTION_BANK.service = [{ type:'truefalse', question:'示例题目', options:['正确','错误'], answer:0 }];
        }

        const QUESTION_BANK = JSON.parse(JSON.stringify(ORIGINAL_QUESTION_BANK));
        (function expandQuestionBank() {
            const areaToCategory = {
                '清洁卫生': 'environment',
                '品控安全': 'quality',
                '服务规范': 'service',
                '安全与制度': 'safety'
            };
            QUESTION_BANK.safety = [];
            const existingQuestions = new Set();
            for (const cat in QUESTION_BANK) {
                QUESTION_BANK[cat].forEach(q => existingQuestions.add(q.question));
            }
            const seenItems = new Set();
            inspectionData.forEach(item => {
                const text = item.item.trim();
                if (!seenItems.has(text)) {
                    seenItems.add(text);
                    const catKey = areaToCategory[item.area];
                    if (catKey && !existingQuestions.has(text)) {
                        QUESTION_BANK[catKey].push({
                            type: 'truefalse',
                            question: text,
                            options: ['正确', '错误'],
                            answer: 0
                        });
                    }
                }
            });
        })();

        const CATEGORY_NAMES = {
            environment: '环境卫生',
            quality: '品控安全',
            service: '服务体验',
            safety: '安全与制度'
        };

        // ==================== 全局状态 ====================
        const allItems = inspectionData.map((item, idx) => ({
            id: `item_${idx}`, area: item.area, statement: item.item, maxScore: item.max, star: item.star
        }));
        const groups = {};
        allItems.forEach(item => {
            if (!groups[item.area]) groups[item.area] = [];
            groups[item.area].push(item);
        });
        const scores = {};
        allItems.forEach(item => { scores[item.id] = { score:0, note:'', images:[] }; });
        const MAX_IMAGES = 5;
        let currentUploadId = null;
        let currentTab = 'inspection';
        let examState = null;

        const hiddenInput = document.getElementById('hiddenFileInput');
        const appContainer = document.getElementById('app-container');

        // ==================== 文件上传处理 ====================
        appContainer.addEventListener('click', (e) => {
            const uploadBtn = e.target.closest('.upload-btn');
            if (uploadBtn) {
                e.preventDefault();
                const id = uploadBtn.getAttribute('data-id');
                if (id) {
                    window.startUpload(id);
                }
            }
        });

        window.startUpload = (id) => {
            currentUploadId = id;
            hiddenInput.value = '';
            hiddenInput.click();
        };

        hiddenInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!currentUploadId) { alert('上传目标不明确'); return; }
            const images = scores[currentUploadId]?.images;
            if (!images) return;
            if (images.length >= MAX_IMAGES) { alert(`最多上传${MAX_IMAGES}张照片`); hiddenInput.value = ''; return; }
            const imgContainer = document.getElementById(`img-container-${currentUploadId}`);
            if (imgContainer) imgContainer.innerHTML = '<span style="font-size:0.8rem;color:var(--primary);">⏳ 图片处理中…</span>';
            const reader = new FileReader();
            reader.onload = function(ev) {
                images.push(ev.target.result);
                renderImagePreviews(currentUploadId);
            };
            reader.onerror = function() { alert('图片读取失败'); if (imgContainer) renderImagePreviews(currentUploadId); };
            reader.readAsDataURL(file);
            hiddenInput.value = '';
        });

        window.removeImageByIndex = (id, idx) => {
            if (scores[id]?.images) {
                scores[id].images.splice(idx, 1);
                renderImagePreviews(id);
            }
        };

        function renderImagePreviews(id) {
            const container = document.getElementById(`img-container-${id}`);
            if (!container) return;
            const imgs = scores[id]?.images || [];
            let html = '';
            imgs.forEach((img, i) => {
                html += `<div class="image-thumb-wrap">
                    <img src="${img}" class="image-preview" alt="照片${i+1}">
                    <span class="remove-img-btn" onclick="removeImageByIndex('${id}',${i})" title="删除">✕</span>
                </div>`;
            });
            if (imgs.length < MAX_IMAGES) {
                html += `<label class="upload-btn" data-id="${id}">📷 拍照 (${imgs.length}/${MAX_IMAGES})</label>`;
            }
            container.innerHTML = html;
        }

        // ==================== 工具函数 ====================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
        function calcPercentage() {
            let total=0, maxTotal=0;
            allItems.forEach(item => { total+=scores[item.id]?.score||0; maxTotal+=item.maxScore; });
            return { total, maxTotal, pct: maxTotal ? (total/maxTotal*100).toFixed(1) : 0 };
        }
        let rafId = null;
        function updateUI() {
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(() => {
                const { total, maxTotal, pct } = calcPercentage();
                const ts = document.getElementById('total-score'); if(ts) ts.textContent = pct;
                const rs = document.getElementById('raw-score'); if(rs) rs.textContent = `${total}/${maxTotal}`;
                const pf = document.getElementById('progress-fill'); if(pf) pf.style.width = Math.floor(pct)+'%';
                for(const area of Object.keys(groups)) {
                    const el = document.getElementById(`subtotal-${area}`);
                    if(el) { let at=0, am=0; groups[area].forEach(item => { at+=scores[item.id]?.score||0; am+=item.maxScore; }); el.textContent=`${at}/${am}`; }
                }
                rafId = null;
            });
        }

        window.setPass = (id, val, btn) => {
            if(!scores[id]) return;
            scores[id].score = val;
            const toggle = btn.parentElement;
            toggle.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active-pass','active-fail'));
            btn.classList.add(val>0?'active-pass':'active-fail');
            updateUI();
        };
        window.toggleAllAccordions = () => {
            const accs = document.querySelectorAll('.accordion');
            const allOpen = accs.length>0 && Array.from(accs).every(a=>a.classList.contains('open'));
            accs.forEach(a => a.classList[allOpen?'remove':'add']('open'));
            updateToggleButtonState();
        };
        window._syncNote = (id, value) => { if(scores[id]) scores[id].note = value; };

        function updateToggleButtonState() {
            const btn = document.getElementById('toggleAllBtn');
            if(!btn) return;
            const accs = document.querySelectorAll('.accordion');
            const allOpen = accs.length>0 && Array.from(accs).every(a=>a.classList.contains('open'));
            btn.textContent = allOpen ? '📁 全部折叠' : '📂 全部展开';
        }

        // ==================== 考核逻辑 ====================
        window.exitExam = () => {
            if (!examState) return;
            if (confirm('确定要退出考核吗？该科成绩将被清零，题目会重新随机排序。')) {
                examState = null;
                currentTab = 'exam';
                renderExamHome();
            }
        };

        window.startExam = function(category) {
            if(!QUESTION_BANK[category]) { alert('题库数据异常'); return; }
            const questions = QUESTION_BANK[category].map(q => ({ ...q }));
            shuffleArray(questions);
            examState = {
                category, questions,
                answers: new Array(questions.length).fill(undefined),
                feedback: new Array(questions.length).fill(null),
                submitted: false
            };
            window.renderExamQuestion(0);
        };

        window.renderExamQuestion = function(index) {
            if(!examState) { renderExamHome(); return; }
            if(examState.submitted) { renderExamResult(); return; }
            if(index < 0 || index >= examState.questions.length) {
                const answered = examState.feedback.filter(f=>f!==null).length;
                return window.renderExamQuestion(answered < examState.questions.length ? answered : 0);
            }
            const q = examState.questions[index];
            const progress = `${index+1}/${examState.questions.length}`;
            const categoryName = CATEGORY_NAMES[examState.category] || examState.category;
            let html = renderTabs() +
                `<h1>${categoryName}考核 <span style="font-size:0.8rem;color:var(--text-secondary);">(${progress})</span></h1>
                <div class="question-block">
                    <div class="q-header"><span class="q-num">第${index+1}题</span><span style="font-size:0.75rem;">${q.type==='multiple'?'【多选题】':'【单选题】'}</span></div>
                    <div class="q-text">${q.question}</div>
                    <div class="options">`;
            const itype = q.type==='multiple'?'checkbox':'radio';
            const hasFeedback = examState.feedback[index] !== null;
            q.options.forEach((opt, oi) => {
                let checked = '';
                if(hasFeedback) {
                    const userAns = examState.answers[index];
                    if(q.type==='multiple' && Array.isArray(userAns) && userAns.includes(oi)) checked = 'checked';
                    else if(userAns === oi) checked = 'checked';
                }
                html += `<label class="option-item"><input type="${itype}" name="q${index}" value="${oi}" ${hasFeedback?'disabled':''} ${checked}> ${opt}</label>`;
            });
            html += `</div>`;
            if(hasFeedback) {
                const fb = examState.feedback[index];
                html += `<div class="feedback ${fb.correct?'correct':'wrong'}">${fb.correct?'✅ 正确':'❌ 错误'} | 正确答案：${fb.correctAnswer}</div>`;
            }
            html += `<div class="exam-nav">`;
            if(!hasFeedback) html += `<button type="button" class="btn" onclick="submitAnswer(${index})">✅ 确认答案</button>`;
            if(index > 0) html += `<button type="button" class="btn btn-outline btn-sm" onclick="window.renderExamQuestion(${index-1})">⬅ 上一题</button>`;
            if(index < examState.questions.length-1) html += `<button type="button" class="btn btn-outline btn-sm" onclick="window.renderExamQuestion(${index+1})">下一题 ➡</button>`;
            // 退出考核按钮 - 始终显示
            html += `<button type="button" class="btn btn-danger-outline btn-sm" onclick="window.exitExam()">🚪 退出考核</button>`;
            if(examState.feedback.filter(f=>f).length === examState.questions.length) html += `<button type="button" class="btn btn-success" onclick="finishExam()">🏆 查看成绩</button>`;
            html += `</div></div>`;
            // 题目导航
            html += `<div class="card" style="text-align:center;padding:0.8rem;"><div style="display:flex;flex-wrap:wrap;gap:0.3rem;justify-content:center;">`;
            for(let i=0; i<examState.questions.length; i++) {
                const isAnswered = examState.feedback[i] !== null;
                const isCorrect = isAnswered && examState.feedback[i].correct;
                const bg = i===index ? 'var(--primary)' : (isAnswered ? (isCorrect ? 'var(--success)' : 'var(--danger)') : '#e8e0d3');
                const color = (i===index || isAnswered) ? '#fff' : 'var(--text)';
                html += `<span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:${bg};color:${color};font-weight:700;font-size:0.75rem;cursor:pointer;" onclick="window.renderExamQuestion(${i})">${i+1}</span>`;
            }
            html += `</div></div>`;
            document.getElementById('app-container').innerHTML = html;
        };

        window.submitAnswer = function(index) {
            if(!examState || examState.feedback[index]) return;
            const q = examState.questions[index];
            let userAns;
            if(q.type==='multiple') {
                const cbs = document.querySelectorAll(`input[name="q${index}"]:checked`);
                userAns = Array.from(cbs).map(cb=>parseInt(cb.value));
            } else {
                const sel = document.querySelector(`input[name="q${index}"]:checked`);
                userAns = sel !== null ? parseInt(sel.value) : null;
            }
            if(userAns===null || (Array.isArray(userAns)&&userAns.length===0)) { alert('请选择答案'); return; }
            examState.answers[index] = userAns;
            let correct = false;
            if(q.type==='multiple') {
                const cSet = new Set(q.answer), uSet = new Set(userAns);
                correct = cSet.size === uSet.size && [...cSet].every(v=>uSet.has(v));
            } else correct = (userAns === q.answer);
            examState.feedback[index] = { correct, correctAnswer: q.type==='multiple' ? q.answer.map(i=>q.options[i]).join('、') : q.options[q.answer] };
            const allDone = examState.feedback.filter(f=>f).length === examState.questions.length;
            if(allDone) { renderExamResult(); }
            else if(index < examState.questions.length-1) {
                let next = index+1;
                while(next < examState.questions.length && examState.feedback[next] !== null) next++;
                window.renderExamQuestion(next < examState.questions.length ? next : index);
            } else window.renderExamQuestion(index);
        };

        window.finishExam = function() { if(examState) { examState.submitted = true; renderExamResult(); } };

        function renderExamResult() {
            if(!examState) return;
            const total = examState.questions.length;
            const correctCount = examState.feedback.filter(f=>f&&f.correct).length;
            const score = Math.round((correctCount/total)*100);
            const wrongList = [];
            examState.questions.forEach((q,i) => { if(examState.feedback[i] && !examState.feedback[i].correct) wrongList.push({num:i+1, question:q.question, answer:examState.feedback[i].correctAnswer}); });
            const categoryName = CATEGORY_NAMES[examState.category] || examState.category;
            let html = renderTabs() +
                `<h1>📊 ${categoryName}考核成绩</h1>
                <div class="result-box">
                    <div class="score-big">${score}<span> / 100分</span></div>
                    <p>正确 <b style="color:var(--success);">${correctCount}</b> / ${total} 题</p>
                    ${score>=75?'<p style="color:#2d6a4f;font-weight:700;">🎉 及格！</p>':'<p style="color:#c0392b;">📚 继续努力</p>'}
                </div>`;
            if(wrongList.length>0) {
                html += `<div class="card"><h3 style="color:var(--danger);">❌ 错题汇总</h3><ul style="padding-left:1.5rem;">`;
                wrongList.forEach(w => html += `<li style="margin-bottom:0.4rem;"><b>第${w.num}题：</b>${w.question}<br><span style="color:var(--success);">✅ 正确答案：${w.answer}</span></li>`);
                html += `</ul></div>`;
            }
            html += `<div style="text-align:center;margin-top:1rem;display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;">
                <button type="button" class="btn" onclick="exportExamResult()">📥 导出成绩单(PDF)</button>
                <button type="button" class="btn btn-outline" onclick="switchTab('exam')">🔙 返回列表</button>
                <button type="button" class="btn btn-outline" onclick="retakeExam()">🔄 重新考核</button>
            </div>`;
            document.getElementById('app-container').innerHTML = html;
        }

        window.retakeExam = function() {
            if(!examState) return;
            window.startExam(examState.category);
        };

        window.exportExamResult = async function() {
            if(!examState || (!examState.submitted && examState.feedback.filter(f=>f).length < examState.questions.length)) {
                alert('请先完成考核并查看成绩后再导出。');
                return;
            }
            const categoryName = CATEGORY_NAMES[examState.category] || examState.category;
            const correctCount = examState.feedback.filter(f=>f&&f.correct).length;
            const score = Math.round((correctCount/examState.questions.length)*100);
            const dateStr = new Date().toLocaleDateString('zh-CN');
            let html = '<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>' + categoryName + '考核成绩单</title><style>' +
                'body{font-family:"Noto Sans SC",system-ui,sans-serif;max-width:800px;margin:0 auto;padding:20px;color:#3a3228;}' +
                'h1{border-bottom:2px solid #c87b3b;padding-bottom:10px;color:#a5622b;}' +
                '.summary{text-align:center;padding:20px;background:#f9f7f2;border-radius:12px;margin:16px 0;border:1px solid #e3dacb;}' +
                '.big{font-size:2.5rem;font-weight:800;color:#a5622b;}' +
                '.question{margin-bottom:12px;padding:8px;border-bottom:1px dashed #e0d8c9;}' +
                '.correct{color:#2d6a4f;} .wrong{color:#c0392b;}' +
                '</style></head><body>' +
                '<h1>📊 ' + categoryName + '考核成绩单</h1>' +
                '<div class="summary"><div class="big">' + score + ' / 100 分</div><p>日期：' + dateStr + ' ｜ 正确：' + correctCount + '/' + examState.questions.length + ' 题</p></div>' +
                '<h2>答题详情</h2>';
            examState.questions.forEach((q, i) => {
                const fb = examState.feedback[i];
                const correctAns = fb ? fb.correctAnswer : '';
                let userAns = '未作答';
                if (fb) {
                    const ua = examState.answers[i];
                    userAns = Array.isArray(ua) ? ua.map(idx => q.options[idx]).join('、') : q.options[ua];
                }
                html += '<div class="question"><p><b>' + (i+1) + '. ' + q.question + '</b></p>' +
                    '<p>你的答案：<span class="' + (fb&&fb.correct?'correct':'wrong') + '">' + userAns + '</span></p>' +
                    '<p>正确答案：<span class="correct">' + correctAns + '</span></p>' +
                    '<p>结果：' + (fb?(fb.correct?'✅ 正确':'❌ 错误'):'❓ 未批改') + '</p></div>';
            });
            html += '</body></html>';

            const element = document.createElement('div');
            element.innerHTML = html;
            const opt = {
                margin: 8,
                filename: categoryName + '考核成绩单_' + dateStr + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                alert('PDF 生成失败，请尝试用 Edge 或 Chrome 打开。');
                console.error(error);
            }
        };

        // ==================== 检查评分渲染 ====================
        function renderTabs() {
            return `<div class="tabs">
                <button class="tab ${currentTab==='inspection'?'active':''}" onclick="switchTab('inspection')">🔍 检查评分</button>
                <button class="tab ${currentTab==='exam'?'active':''}" onclick="switchTab('exam')">📝 分科考核</button>
            </div>`;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            if(tab==='inspection') renderInspection();
            else if(tab==='exam') {
                if(examState && !examState.submitted && examState.feedback.filter(f=>f).length < examState.questions.length) {
                    const answered = examState.feedback.filter(f=>f).length;
                    window.renderExamQuestion(answered < examState.questions.length ? answered : 0);
                } else renderExamHome();
            }
        };

        function renderInspection() {
            let html = renderTabs() + `<h1 style="text-align:center;">斗碗面评分系统</h1><p style="text-align:center;color:var(--text-secondary);margin-bottom:0.5rem;"> 满分100分 </p>
            <div class="score-bar"><div class="score-circle"><span id="total-score">0</span><span>分</span></div><div class="score-info"><b>检查进度</b><br><small>原始分 <span id="raw-score">0/0</span></small><div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div></div></div>`;
            for(const [area, items] of Object.entries(groups)) {
                html += `<div class="accordion"><div class="accordion-header" onclick="this.parentElement.classList.toggle('open');updateToggleButtonState();"><span class="header-area">${area} (${items.length}项)</span><span class="header-sub" id="subtotal-${area}">0/0</span></div><div class="accordion-body">`;
                items.forEach((item, idx) => {
                    const id = item.id;
                    html += `<div class="check-card ${item.star?'star-item':''}"><div class="card-num">${idx+1}</div><div class="card-content"><div class="card-text">${item.star?'<span class="star-badge">✮✮✮✮✮</span>':''}${item.statement}</div><div class="card-max">满分 ${item.maxScore} 分</div>
                    <input class="note-input" placeholder="📝 备注" id="note-${id}" oninput="window._syncNote('${id}', this.value)">
                    <div class="image-upload-area" id="img-container-${id}"></div></div>
                    <div class="score-control"><div class="toggle-group"><button class="toggle-btn" onclick="setPass('${id}',${item.maxScore},this)">达标</button><button class="toggle-btn active-fail" onclick="setPass('${id}',0,this)">不达标</button></div></div></div>`;
                });
                html += `</div></div>`;
            }
            html += `<div class="bottom-bar"><button class="btn btn-outline" id="toggleAllBtn" onclick="toggleAllAccordions()">📂 全部展开</button><button class="btn btn-outline" onclick="previewReport()">🖨️ 预览报告</button><button class="btn" onclick="exportPDF()">📥 导出PDF</button></div>`;
            document.getElementById('app-container').innerHTML = html;
            allItems.forEach(item => {
                const input = document.getElementById(`note-${item.id}`);
                if(input) input.value = scores[item.id].note;
                renderImagePreviews(item.id);
            });
            updateToggleButtonState();
            updateUI();
        }

        window.previewReport = () => { const w=window.open('','_blank'); if(w){w.document.write(buildReportHTML());w.document.close();} else alert('请允许弹出窗口'); };
        window.exportPDF = async function() {
            const element = document.createElement('div');
            element.innerHTML = buildReportHTML();
            element.style.padding = '20px';
            element.style.fontFamily = "'Noto Sans SC', system-ui, sans-serif";
            
            const opt = {
                margin: 10,
                filename: '斗碗面评分报告_' + new Date().toLocaleDateString() + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                alert('PDF 生成失败，请尝试用 Edge 或 Chrome 打开，或使用预览报告后另存为 PDF。');
                console.error(error);
            }
        }; 
        function buildReportHTML() {
            const {total, maxTotal, pct} = calcPercentage();
            let h = `<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>斗碗面评分报告</title><style>body{font-family:'Noto Sans SC',system-ui,sans-serif;max-width:800px;margin:0 auto;padding:20px}h1{border-bottom:2px solid #c87b3b}h2{color:#a5622b}.card{border:1px solid #ddd;border-radius:10px;padding:10px;margin:8px 0;display:flex}.star{color:#c0392b}.score{font-weight:bold}.note{color:#555}.images img{max-width:200px;max-height:150px;margin:4px}@media print{body{max-width:100%}}</style></head><body><h1>斗碗面评分报告</h1><p>日期：${new Date().toLocaleDateString()} ｜ 得分：${pct}/100 ｜ 总分：${total}/${maxTotal}</p>`;
            for(const [area, items] of Object.entries(groups)) {
                h += `<h2>${area}</h2>`;
                items.forEach((item, idx) => {
                    const s = scores[item.id]; const status = s.score>0?'达标':'不达标';
                    let imgs = ''; if(s.images?.length) imgs = '<div class="images">'+s.images.map(img=>`<img src="${img}">`).join('')+'</div>';
                    h += `<div class="card"><span style="min-width:30px">${idx+1}.</span><div><div>${item.star?'<span class="star">[✮✮✮✮✮]</span> ':''}${item.statement} <span class="score">(${status})</span></div>${s.note?`<div class="note">备注：${s.note}</div>`:''}${imgs}</div></div>`;
                });
            }
            return h + '</body></html>';
        }

        function renderExamHome() {
            let html = renderTabs() + `<h1>📝 分科考核</h1><p style="text-align:center;color:var(--text-secondary);">选择类别开始考核，每科满分100分（题目随机排序）</p><div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">`;
            for(const [cat, questions] of Object.entries(QUESTION_BANK)) {
                html += `<div class="card" style="flex:1; min-width:180px; text-align:center;"><h3>${CATEGORY_NAMES[cat]}</h3><p>共 ${questions.length} 题</p><button class="btn" onclick="startExam('${cat}')">开始考核</button></div>`;
            }
            html += `</div>`;
            document.getElementById('app-container').innerHTML = html;
        }

        document.addEventListener('click', (e) => {
            if(e.target.closest('.accordion-header')) setTimeout(updateToggleButtonState, 50);
        });

        // ==================== PWA Service Worker 注册 ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(e => console.log('SW注册失败', e));
            });
        }

        renderInspection();
        console.log('✅ 斗碗面评分系统已启动 - 支持中途退出考核');
    })();
</script>
</body>
</html>
